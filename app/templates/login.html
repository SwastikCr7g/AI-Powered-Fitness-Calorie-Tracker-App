<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus Fitness - Terminal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="login-container">
    <h1><i class="fas fa-bolt"></i> FITNESS PRO </h1>
    <p style="color: #94a3b8; font-weight: 300;">Initialize your bio-metrics to start tracking.</p>

    <form action="{{ url_for('login') }}" method="POST" class="login-form">
      <input type="text" name="name" placeholder="User Identification (Name)" required />

      <div style="display: flex; gap: 10px;">
        <input type="number" name="age" placeholder="Age" min="1" required />
        <select name="gender" required>
            <option value="" disabled selected>Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px;">
        <input type="number" name="weight" placeholder="Weight (kg)" step="0.1" required />
        <input type="number" name="height" placeholder="Height (cm)" step="0.1" required />
      </div>

      <select name="activity_level" required>
        <option value="" disabled selected>System Activity Level</option>
        <option value="sedentary">Sedentary (No Exercise)</option>
        <option value="light">Lightly Active (1–3 days/week)</option>
        <option value="moderate">Moderately Active (3–5 days/week)</option>
        <option value="very">Highly Active (6–7 days/week)</option>
        <option value="extra">Elite Athlete (Hard Training)</option>
      </select>

      <button type="submit">Initialize <i class="fas fa-arrow-right"></i></button>
    </form>
  </div>
</body>
</html>
